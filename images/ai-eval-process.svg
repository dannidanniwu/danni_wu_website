<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 800" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0E6E66"/>
    </marker>
  </defs>

  <text x="64" y="44" font-size="13" letter-spacing="1.5" fill="#0E6E66" font-weight="600">THE REAL-WORLD EVAL PROCESS</text>
  <text x="64" y="70" font-size="15" fill="#5B6472">Start small with human judgment, calibrate an automated judge, then scale toward real users.</text>

  <line x1="64" y1="120" x2="64" y2="720" stroke="#E7E5DF" stroke-width="2"/>

  <text x="92" y="116" font-size="11" letter-spacing="1.2" fill="#0E6E66" font-weight="600">CALIBRATE ON A SMALL SET</text>

  <g>
    <circle cx="64" cy="150" r="17" fill="#0E6E66"/>
    <text x="64" y="155" font-size="14" fill="#FBFBF9" text-anchor="middle" font-weight="600">1</text>
    <rect x="92" y="126" width="572" height="48" rx="8" fill="#EEF5F3" stroke="#E7E5DF" stroke-width="1"/>
    <text x="108" y="148" font-size="15" fill="#1B2330" font-weight="600">Start with a basic prompt</text>
    <text x="108" y="166" font-size="13" fill="#5B6472">Get a first working version of the system in place — something to evaluate.</text>
  </g>

  <g>
    <circle cx="64" cy="226" r="17" fill="#0E6E66"/>
    <text x="64" y="231" font-size="14" fill="#FBFBF9" text-anchor="middle" font-weight="600">2</text>
    <rect x="92" y="202" width="572" height="48" rx="8" fill="#EEF5F3" stroke="#E7E5DF" stroke-width="1"/>
    <text x="108" y="224" font-size="15" fill="#1B2330" font-weight="600">Define your evaluation criteria</text>
    <text x="108" y="242" font-size="13" fill="#5B6472">The aspects you grade on — accuracy, tone, completeness — made measurable.</text>
  </g>

  <g>
    <circle cx="64" cy="302" r="17" fill="#0E6E66"/>
    <text x="64" y="307" font-size="14" fill="#FBFBF9" text-anchor="middle" font-weight="600">3</text>
    <rect x="92" y="278" width="572" height="48" rx="8" fill="#EEF5F3" stroke="#E7E5DF" stroke-width="1"/>
    <text x="108" y="300" font-size="15" fill="#1B2330" font-weight="600">Hand-label a small set → golden dataset</text>
    <text x="108" y="318" font-size="13" fill="#5B6472">Label ~10 examples against the criteria; check inter-annotator agreement.</text>
  </g>

  <g>
    <circle cx="64" cy="378" r="17" fill="#0E6E66"/>
    <text x="64" y="383" font-size="14" fill="#FBFBF9" text-anchor="middle" font-weight="600">4</text>
    <rect x="92" y="354" width="572" height="48" rx="8" fill="#EEF5F3" stroke="#E7E5DF" stroke-width="1"/>
    <text x="108" y="376" font-size="15" fill="#1B2330" font-weight="600">Bring in an LLM judge — and iterate</text>
    <text x="108" y="394" font-size="13" fill="#5B6472">Refine the prompt and re-run until the judge aligns with your golden dataset.</text>
  </g>

  <path d="M 40 378 C 16 378, 16 302, 40 302" fill="none" stroke="#0E6E66" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="11" y="340" font-size="11" fill="#0E6E66" text-anchor="middle" transform="rotate(-90 11 340)" font-weight="600">iterate</text>

  <text x="92" y="444" font-size="11" letter-spacing="1.2" fill="#0E6E66" font-weight="600">SCALE</text>

  <g>
    <circle cx="64" cy="478" r="17" fill="#0E6E66"/>
    <text x="64" y="483" font-size="14" fill="#FBFBF9" text-anchor="middle" font-weight="600">5</text>
    <rect x="92" y="454" width="572" height="48" rx="8" fill="#EEF5F3" stroke="#E7E5DF" stroke-width="1"/>
    <text x="108" y="476" font-size="15" fill="#1B2330" font-weight="600">Scale up and spot-check</text>
    <text x="108" y="494" font-size="13" fill="#5B6472">Run the judge at scale; verify against a random human-labeled sample.</text>
  </g>

  <text x="92" y="544" font-size="11" letter-spacing="1.2" fill="#0E6E66" font-weight="600">SHIP GRADUALLY</text>

  <g>
    <circle cx="64" cy="578" r="17" fill="#0E6E66"/>
    <text x="64" y="583" font-size="14" fill="#FBFBF9" text-anchor="middle" font-weight="600">6</text>
    <rect x="92" y="554" width="572" height="48" rx="8" fill="#EEF5F3" stroke="#E7E5DF" stroke-width="1"/>
    <text x="108" y="576" font-size="15" fill="#1B2330" font-weight="600">Run a small real-world test</text>
    <text x="108" y="594" font-size="13" fill="#5B6472">Ship to a limited audience: an A/B test, internal users, or ~1% of traffic.</text>
  </g>

  <g>
    <circle cx="64" cy="654" r="17" fill="#0E6E66"/>
    <text x="64" y="659" font-size="14" fill="#FBFBF9" text-anchor="middle" font-weight="600">7</text>
    <rect x="92" y="630" width="572" height="48" rx="8" fill="#EEF5F3" stroke="#E7E5DF" stroke-width="1"/>
    <text x="108" y="652" font-size="15" fill="#1B2330" font-weight="600">Evaluate in the wild</text>
    <text x="108" y="670" font-size="13" fill="#5B6472">Look at real-world data with evals in place; assess overall quality.</text>
  </g>
</svg>
