<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != "/" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — Biostatistician{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80' font-family='serif'>𝒟</text></svg>">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <nav class="nav" aria-label="Main">
      <a class="nav-name" href="{{ '/' | relative_url }}">Danni Wu</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" {% if page.url == "/" %}aria-current="page"{% endif %}>About</a>
        <a href="{{ '/publications/' | relative_url }}" {% if page.url contains "/publications" %}aria-current="page"{% endif %}>Publications</a>
        <a href="{{ '/blog/' | relative_url }}" {% if page.url contains "/blog" %}aria-current="page"{% endif %}>Blog</a>
        <a href="{{ '/files/Danni_Wu_CV.pdf' | relative_url }}" target="_blank" rel="noopener">CV</a>
      </div>
    </nav>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© {{ 'now' | date: "%Y" }} Danni Wu</span>
      <div class="footer-links">
        <a href="{{ site.links.email }}">Email</a>
        <a href="{{ site.links.scholar }}" target="_blank" rel="noopener">Google Scholar</a>
        <a href="{{ site.links.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ site.links.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </footer>
</body>
</html>
