<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != "/" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — Biostatistician{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80' font-family='serif'>𝒟</text></svg>">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <nav class="nav" aria-label="Main">
      <a class="nav-name" href="{{ '/' | relative_url }}">Danni Wu</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" {% if page.url == "/" %}aria-current="page"{% endif %}>About</a>
        <a href="{{ '/publications/' | relative_url }}" {% if page.url contains "/publications" %}aria-current="page"{% endif %}>Publications</a>
        <a href="{{ '/blog/' | relative_url }}" {% if page.url contains "/blog" %}aria-current="page"{% endif %}>Blog</a>
      </div>
    </nav>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© {{ 'now' | date: "%Y" }} Danni Wu</span>
      <div class="footer-links">
        <a href="{{ site.links.email }}">Email</a>
        <a href="{{ site.links.scholar }}" target="_blank" rel="noopener">Google Scholar</a>
        <a href="{{ site.links.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ site.links.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </footer>
  <!-- Cursor dot trail -->
<canvas id="cursor-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>
<script>
(function() {
  var canvas = document.getElementById('cursor-canvas');
  var ctx = canvas.getContext('2d');
  var count = 20, size = 6, speed = 0.15;
  var color = '#0E6E66';
  var mouse = {x:-999,y:-999};
  var dots = Array.from({length:count},function(){return{x:0,y:0};});
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  function hex(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
  // Draw a four-pointed star centered at (cx,cy) with outer radius r
  function star(cx,cy,r){
    var inner = r*0.38;                  // controls how "spiky" the star is (smaller = sharper)
    ctx.beginPath();
    for(var p=0;p<8;p++){
      var rad = (p%2===0) ? r : inner;   // alternate outer point / inner notch
      var ang = (Math.PI/4)*p - Math.PI/2; // start pointing up
      var px = cx + Math.cos(ang)*rad;
      var py = cy + Math.sin(ang)*rad;
      if(p===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
  }
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var rgb=hex(color);
    dots[0].x+=(mouse.x-dots[0].x)*speed;
    dots[0].y+=(mouse.y-dots[0].y)*speed;
    for(var i=1;i<dots.length;i++){dots[i].x+=(dots[i-1].x-dots[i].x)*speed;dots[i].y+=(dots[i-1].y-dots[i].y)*speed;}
    for(var i=0;i<dots.length;i++){
      var t=1-i/dots.length,r=Math.max(1,size*t),a=(t*0.85).toFixed(2);
      star(dots[i].x,dots[i].y,r);
      ctx.fillStyle='rgba('+rgb.r+','+rgb.g+','+rgb.b+','+a+')';ctx.fill();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
